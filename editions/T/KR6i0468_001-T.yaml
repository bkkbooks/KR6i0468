body:
  text: 宋天竺三藏求那跋陀羅譯其有三德學號真學為上品其持具戒學號承法為中品其受卑戒學號依福學為下品其行三事號散侍為外品又真學三德者一曰戒行備具二曰多知經法三曰能化度人是為三德號真學者也又承法具戒者純五戒信審罪福奉承法教也又依福卑戒者但持上四戒不持酒戒隨世習俗不變欲事是為依福學也又散侍三事非戒也何謂三一者身歸法二者供養法三名於同學法持自有弓分別無師無所承自然心好無所拘礙名散侍法也真學功德勝於承法學百倍也承法功德勝依福百倍也依福功德百倍勝散侍也散侍功德勝凡俗百倍也凡俗之人或不如畜生畜生或勝於人所以者何人作罪不止入地獄罪竟為餓鬼餓鬼罪竟轉為畜生畜生罪竟乃還為人畜生中皆畢罪便得為人是故人當作善奉行三尊之教學上四品之法長離三惡道展轉天上下生人中豪尊世世受福德長解脫若失威儀一事者常自學如法應時自赴誡誨即解若懈怠不勤者應退著下座後有功德乃更復之若受語不用及犯戒者應便彈棄莫著眾中恐敗餘人若新受法未滿三月者其有所犯先不應問也未習故也若諸學者承用此律上下相檢乃可至竟疾成大願散侍法問曰若有善男子欲入正道欲依大道而不耐戒當作何行以求福祥師曰亦有三事名散侍法好可奉何謂三一者身所護法二者供養法三者於同學法行此三事即勝作凡俗時百倍也又散侍身所能法者云何雖不持戒當與凡俗小異遊居之處數就有經道之處若見世俗所行善者法之惡者莫用好言識也醜語勿名是為散侍第一法又散侍供養法者云何當侍三寶朝夕莫懈心常歸向並修經書若居貧窮無用供養者當加勤仂見人福躬親佐助心代其歡是為散侍第二法又散侍於同學法者云何當敬愛其輩無相憍慢坐起念之出入參之如己觀也若行路者近則相問遠當待望慎莫背忽是為散侍第三法師曰行者三事雖未即度猶如地多石多草種雖不好故得少少以續其時猶勝不種也種業不廢會得好地所種乃成收歛有盈斯亦然矣行之不休福德扶持會受真戒號
